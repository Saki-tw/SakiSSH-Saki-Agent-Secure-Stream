name: SakiAgentSSHClient
options:
  bundleIdPrefix: tw.com.saki-studio
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  developmentLanguage: en

settings:
  base:
    DEVELOPMENT_TEAM: 36HPTNN8NU
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "5"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Saki Studio. All rights reserved."
    INFOPLIST_KEY_CFBundleDisplayName: "SakiAgentSSH Client"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
    INFOPLIST_KEY_ATSApplicationFontsPath: "Fonts"

targets:
  SakiAgentSSHClient:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    resources:
      - path: Resources/Credits.rtf
      - path: Resources/GenJyuuGothicX-Regular.ttf
        buildPhase: resources
      - path: Resources/AppIcon.icns
      - path: Resources/avan.png
      - path: Resources/help_zh-Hant.md
      - path: Resources/help_en-US.md
      - path: Resources/help_ja-JP.md
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.com.saki-studio.SakiAgentSSH-Client-GUIApp
        CODE_SIGN_ENTITLEMENTS: SakiAgentSSHClient.entitlements
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Saki Studio. All rights reserved."
        INFOPLIST_KEY_CFBundleIconFile: AppIcon
        ENABLE_ONLY_ACTIVE_RESOURCES: NO
        ASSETCATALOG_COMPILER_OPTIMIZATION: ""
    entitlements:
      path: SakiAgentSSHClient.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    postBuildScripts:
      - name: "Copy Resources"
        script: |
          RES_DIR="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          FONTS_DIR="${RES_DIR}/Fonts"
          mkdir -p "${FONTS_DIR}"
          cp "${SRCROOT}/Resources/GenJyuuGothicX-Regular.ttf" "${FONTS_DIR}/" 2>/dev/null || true
          cp "${SRCROOT}/Resources/Credits.rtf" "${RES_DIR}/" 2>/dev/null || true
          cp "${SRCROOT}/Resources/help_zh-Hant.md" "${RES_DIR}/" 2>/dev/null || true
          cp "${SRCROOT}/Resources/help_en-US.md" "${RES_DIR}/" 2>/dev/null || true
          cp "${SRCROOT}/Resources/help_ja-JP.md" "${RES_DIR}/" 2>/dev/null || true
          cp "${SRCROOT}/Resources/AppIcon.icns" "${RES_DIR}/" 2>/dev/null || true
          cp "${SRCROOT}/Resources/avan.png" "${RES_DIR}/" 2>/dev/null || true
        basedOnDependencyAnalysis: false
